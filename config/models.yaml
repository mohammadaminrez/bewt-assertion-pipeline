models:
  gpt-4o:
    provider: "openai"
    model_id: "gpt-4o"
    temperature: 0.0
    max_tokens: 1024
    api_key_env: "OPENAI_API_KEY"

  gpt-4o-mini:
    provider: "openai"
    model_id: "gpt-4o-mini"
    temperature: 0.0
    max_tokens: 1024
    api_key_env: "OPENAI_API_KEY"

  claude-sonnet:
    provider: "anthropic"
    model_id: "claude-sonnet-4-20250514"
    temperature: 0.0
    max_tokens: 1024
    api_key_env: "ANTHROPIC_API_KEY"

  claude-haiku:
    provider: "anthropic"
    model_id: "claude-haiku-4-5-20251001"
    temperature: 0.0
    max_tokens: 1024
    api_key_env: "ANTHROPIC_API_KEY"

default_model: "gpt-4o"
retry_attempts: 3
retry_delay_seconds: 5
cache_responses: true
